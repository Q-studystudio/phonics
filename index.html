<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>自然拼读 · 简洁版</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #eaf4eb;
            color: #2c3e50;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-icon { font-size: 28px; cursor: pointer; background: none; border: none; padding: 8px; border-radius: 12px; }
        .title { font-size: 20px; font-weight: 600; color: #2a5c2a; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .mode-select { padding: 8px 14px; border-radius: 40px; border: 1px solid #cbdcc2; background: white; cursor: pointer; font-size: 14px; }
        .appear-btn { background: #2a5c2a; color: white; border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-size: 14px; }
        .main-area { display: flex; justify-content: center; padding: 20px; }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed; left: 0; top: 60px; width: 260px; height: calc(100% - 60px);
            background: #fefcf5; border-right: 1px solid #ddd; transform: translateX(-100%);
            transition: transform 0.25s ease; z-index: 90; overflow-y: auto;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { padding: 16px; font-weight: bold; border-bottom: 1px solid #eee; background: #faf8f0; }
        .sidebar-list { padding: 8px 0; min-height: 200px; }
        .sidebar-item {
            padding: 14px 18px; cursor: grab; border-bottom: 1px solid #e9ece5;
            user-select: none; background: white; font-size: 16px;
        }
        .sidebar-item:active { cursor: grabbing; }
        .sidebar-item:hover { background: #e8f0e8; }
        .sidebar-item.active { background: #d9ead3; border-left: 4px solid #2a5c2a; font-weight: 600; }
        .sortable-drag { opacity: 0.3; background: #c8e0c8; }
        .sortable-ghost { opacity: 0.4; background: #a0c8a0; }
        .drag-hint { font-size: 11px; color: #aaa; text-align: center; padding: 8px; border-top: 1px solid #eee; }
        
        /* 右侧面板 */
        .right-panel {
            position: fixed; right: 0; top: 60px; width: 300px; height: calc(100% - 60px);
            background: white; border-left: 1px solid #ddd; transform: translateX(100%);
            transition: transform 0.25s ease; z-index: 90; overflow-y: auto;
        }
        .right-panel.open { transform: translateX(0); }
        .panel-header { padding: 16px; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; background: #faf8f0; }
        .close-panel { background: none; border: none; font-size: 24px; cursor: pointer; padding: 0 8px; }
        .section { padding: 14px; border-bottom: 1px solid #f0f0f0; }
        .section-title { font-weight: 600; margin-bottom: 10px; color: #3a6b3a; }
        .card-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; cursor: pointer; font-size: 15px; }
        .card-item:hover { background: #e8f0e8; }
        .clear-single-btn { background: none; border: none; color: #bc9a6c; font-size: 20px; cursor: pointer; padding: 4px 8px; }
        .clear-all-btn { width: 90%; margin: 16px auto; display: block; background: #e0cfb1; border: none; padding: 12px; border-radius: 40px; cursor: pointer; font-size: 14px; }
        .empty-tip { color: #aaa; text-align: center; padding: 15px; font-size: 13px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 85; display: none; }
        .overlay.show { display: block; }
        
        /* ========== 卡片3D翻转 ========== */
        .card-wrapper { width: 100%; max-width: 550px; margin: 0 auto; }
        .card-container {
            width: 100%;
            min-height: 420px;
            perspective: 1000px;
            margin-bottom: 20px;
            position: relative;
            cursor: pointer;
        }
        .card {
            width: 100%;
            min-height: 420px;
            position: relative;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 420px;
            backface-visibility: hidden;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
        }
        .card-front { transform: rotateY(0deg); }
        .card-back { transform: rotateY(180deg); }
        
        /* 问号图标 */
        .info-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            background: #e8e8e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            z-index: 10;
            transition: all 0.2s;
        }
        .info-icon:hover { background: #d0d0d0; transform: scale(1.05); }
        .info-icon:active { transform: scale(0.95); }
        
        /* ========== 正面内容 ========== */
        .front-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .f-ipa {
            font-size: 72px;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 500;
        }
        .f-phoneme {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #3a5a3a;
        }
        .f-category {
            font-size: 16px;
            color: #888;
            margin-bottom: 25px;
        }
        
        /* ========== 反面内容 ========== */
        .back-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .b-word-container { margin-bottom: 5px; }
        .b-word { font-size: 48px; font-weight: bold; margin-bottom: 5px; }
        .highlight { color: #e74c3c; text-decoration: underline; }
        .b-ipa-full {
            font-size: 24px;
            color: #555;
            margin-bottom: 20px;
        }
        .ipa-highlight {
            color: #e74c3c;
            text-decoration: underline;
            font-weight: 500;
        }
        .b-en { font-size: 20px; margin-bottom: 10px; }
        .b-cn { font-size: 15px; color: #888; margin-bottom: 25px; }
        
        .audio-area { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .btn-audio {
            background: #3498db; color: white; border: none; border-radius: 40px;
            padding: 10px 24px; font-size: 15px; cursor: pointer;
            transition: all 0.2s;
            min-width: 70px;
        }
        .btn-audio:active { transform: scale(0.96); }
        .card-footer { margin-top: 15px; padding-top: 12px; border-top: 1px solid #eee; }
        .card-number { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 12px; }
        .rating-buttons { display: none; gap: 10px; justify-content: space-between; }
        .rating-buttons.visible { display: flex; }
        .btn-rate {
            flex: 1; padding: 12px 5px; font-size: 15px; font-weight: bold;
            border: none; border-radius: 12px; cursor: pointer; color: white;
            transition: all 0.2s;
        }
        .btn-rate:active { transform: scale(0.97); }
        .rate-1 { background: #e74c3c; }
        .rate-2 { background: #e67e22; }
        .rate-3 { background: #2ecc71; }
        .rate-4 { background: #3498db; }
        
        /* 移除正面的翻转按钮，只保留卡片点击翻转 */
        .front-footer { display: none; }
        
        /* ========== 导航按钮 ========== */
        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .nav-buttons.visible {
            opacity: 1;
        }
        .card-wrapper:hover .nav-buttons {
            opacity: 1;
        }
        .nav-btn {
            flex: 1; max-width: 150px; padding: 14px 20px;
            background: #5a8f5a; color: white; border: none; border-radius: 40px;
            cursor: pointer; font-size: 16px; font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }
        .nav-btn:active { transform: scale(0.96); }
        
        /* 简洁底部提示 */
        .keyboard-hint {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 85%;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.25s ease;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-header {
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            border-radius: 24px 24px 0 0;
        }
        .modal-header h3 { font-size: 18px; color: #2a5c2a; }
        .modal-close {
            background: none; border: none; font-size: 26px;
            cursor: pointer; color: #999; padding: 0 8px;
        }
        .modal-body {
            padding: 20px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .f-ipa { font-size: 56px; }
            .f-phoneme { font-size: 38px; }
            .f-category { font-size: 14px; }
            .b-word { font-size: 38px; }
            .b-ipa-full { font-size: 20px; }
            .b-en { font-size: 18px; }
            .btn-rate { padding: 10px 3px; font-size: 13px; }
            .btn-audio { padding: 8px 18px; font-size: 14px; }
            .nav-btn { padding: 12px 16px; font-size: 14px; }
            .card-container, .card, .card-face { min-height: 420px; }
            .nav-buttons { opacity: 0.3; }
            .card-wrapper:hover .nav-buttons { opacity: 1; }
        }
        
        @media (max-width: 480px) {
            .f-ipa { font-size: 48px; }
            .f-phoneme { font-size: 32px; }
            .b-word { font-size: 32px; }
            .b-ipa-full { font-size: 18px; }
            .card-container, .card, .card-face { min-height: 440px; }
            .btn-rate { padding: 8px 2px; font-size: 12px; }
            .btn-audio { padding: 6px 14px; font-size: 13px; }
        }
        
        button { touch-action: manipulation; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="menu-icon" id="sidebarToggle">☰</button>
        <span class="title">自然拼读</span>
    </div>
    <div class="header-right">
        <select id="modeSelect" class="mode-select">
            <option value="order">顺序模式</option>
            <option value="random">随机模式</option>
            <option value="difficulty">难度排序</option>
        </select>
        <button class="appear-btn" id="appearBtn">出现 0</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">📖 关于</h3>
            <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody">加载中...</div>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">📋 目录 <span style="font-size:12px;">(拖拽排序)</span></div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="drag-hint">✨ 顺序模式下可拖拽调整顺序</div>
</div>

<div class="right-panel" id="rightPanel">
    <div class="panel-header"><span>📋 已出现的卡片</span><button class="close-panel" id="closePanelBtn">✕</button></div>
    <div id="rightPanelContent"></div>
    <button id="clearAllBtn" class="clear-all-btn">清除全部浏览记录</button>
</div>

<div class="main-area">
    <div class="card-wrapper">
        <div class="card-container" id="cardContainer">
            <div class="card" id="flashcard">
                <!-- 正面（无翻转按钮） -->
                <div class="card-face card-front">
                    <div class="info-icon">ⓘ</div>
                    <div class="front-content">
                        <div class="f-ipa" id="fIpa">/aɪ/</div>
                        <div class="f-phoneme" id="fPhoneme">igh</div>
                        <div class="f-category" id="fCategory">long vowels</div>
                        <div class="audio-area"><button class="btn-audio" id="btnFrontAudio">🔊 发音</button></div>
                    </div>
                </div>
                <!-- 反面 -->
                <div class="card-face card-back">
                    <div class="info-icon">ⓘ</div>
                    <div class="back-content">
                        <div class="b-word-container">
                            <div class="b-word" id="bWord">night</div>
                            <div class="b-ipa-full" id="bIpaFull">/naɪt/</div>
                        </div>
                        <div class="b-en" id="bEn">The night is dark.</div>
                        <div class="b-cn" id="bCn">夜晚很暗。</div>
                        <div class="audio-area">
                            <button class="btn-audio" id="btnWordAudio">🔊 单词</button>
                            <button class="btn-audio" id="btnSentenceAudio">🔊 例句</button>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="card-number" id="cardNumber">1 / 48</div>
                        <div class="rating-buttons" id="ratingButtons">
                            <button class="btn-rate rate-1" data-rate="1">Again</button>
                            <button class="btn-rate rate-2" data-rate="2">Hard</button>
                            <button class="btn-rate rate-3" data-rate="3">Good</button>
                            <button class="btn-rate rate-4" data-rate="4">Easy</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-buttons" id="navButtons">
            <button class="nav-btn" id="prevBtn">◀ 上一张</button>
            <button class="nav-btn" id="nextBtn">下一张 ▶</button>
        </div>
        <div class="keyboard-hint">← → 翻页 | 空格 翻转 | 1-4 评分</div>
    </div>
</div>

<script>
(function() {
    // ========== 单词完整音标映射表（修复音标问题）==========
    var WORD_IPA_MAP = {
        "cat": "/kæt/", "bed": "/bed/", "sit": "/sɪt/", "hot": "/hɒt/", "cup": "/kʌp/",
        "rain": "/reɪn/", "bee": "/biː/", "boat": "/bəʊt/", "moon": "/muːn/",
        "ship": "/ʃɪp/", "chair": "/tʃeə/", "thumb": "/θʌm/", "whale": "/weɪl/",
        "duck": "/dʌk/", "ring": "/rɪŋ/", "sink": "/sɪŋk/", "car": "/kɑː/",
        "her": "/hɜː/", "bird": "/bɜːd/", "fork": "/fɔːk/", "turtle": "/tɜːtl/",
        "cake": "/keɪk/", "day": "/deɪ/", "leaf": "/liːf/", "night": "/naɪt/",
        "cow": "/kaʊ/", "house": "/haʊs/", "coin": "/kɔɪn/", "boy": "/bɔɪ/",
        "crew": "/kruː/", "blue": "/bluː/", "saw": "/sɔː/", "haunt": "/hɔːnt/",
        "book": "/bʊk/", "touch": "/tʌtʃ/", "queen": "/kwiːn/", "phone": "/fəʊn/",
        "knee": "/niː/", "write": "/raɪt/", "lamb": "/læm/", "watch": "/wɒtʃ/",
        "bridge": "/brɪdʒ/", "apple": "/ˈæpl/", "action": "/ˈækʃən/"
    };
    
    // 特殊音素详细解释
    var SPECIAL_EXPLANATIONS = {
        "igh": "🔹 发音：/aɪ/（同单词 \"I\"）\n🔹 类型：三字母组合 (Trigraph)\n🔹 位置：只出现在单词中间或结尾\n🔹 示例单词：night, light, high, right, bright\n🔹 拼写规律：看到 \"igh\" 直接读 /aɪ/，是固定组合\n🔹 对比：\"i_e\"（如 bike）也是 /aɪ/，但 \"igh\" 是三个字母的组合",
        "tch": "🔹 发音：/tʃ/（同 \"ch\"）\n🔹 类型：三字母组合\n🔹 位置：只出现在短元音后的单词结尾\n🔹 示例单词：watch, catch, match, fetch, pitch\n🔹 拼写规律：短元音后用 tch，其他情况用 ch",
        "ck": "🔹 发音：/k/\n🔹 类型：双字母组合\n🔹 位置：只出现在短元音后的单词结尾\n🔹 示例单词：duck, back, sick, lock, luck\n🔹 拼写规律：在短元音后用 ck，其他情况用 k 或 c",
        "kn": "🔹 发音：/n/（k 不发音）\n🔹 类型：静音字母组合\n🔹 示例单词：knee, know, knife, knock",
        "wr": "🔹 发音：/r/（w 不发音）\n🔹 类型：静音字母组合\n🔹 示例单词：write, wrong, wrist, wrap",
        "mb": "🔹 发音：/m/（b 不发音）\n🔹 类型：静音字母组合\n🔹 示例单词：lamb, comb, thumb, climb",
        "wh": "🔹 发音：/w/（部分口音读 /hw/）\n🔹 类型：双字母组合\n🔹 示例单词：whale, wheel, white, what",
        "ng": "🔹 发音：/ŋ/（软腭鼻音）\n🔹 类型：双字母组合\n🔹 示例单词：ring, song, king, thing",
        "nk": "🔹 发音：/ŋk/\n🔹 类型：双字母组合\n🔹 示例单词：sink, pink, think, thank",
        "ph": "🔹 发音：/f/\n🔹 类型：双字母组合（希腊词源）\n🔹 示例单词：phone, photo, elephant",
        "qu": "🔹 发音：/kw/\n🔹 类型：双字母组合\n🔹 示例单词：queen, quick, quiet, quite",
        "tion": "🔹 发音：/ʃən/\n🔹 类型：后缀\n🔹 示例单词：action, nation, station",
        "a_e": "🔹 发音：/eɪ/\n🔹 类型：魔法e\n🔹 示例单词：cake, make, take, name\n🔹 规律：e 不发音，a 发长音 /eɪ/",
        "i_e": "🔹 发音：/aɪ/\n🔹 类型：魔法e\n🔹 示例单词：bike, like, time, five",
        "o_e": "🔹 发音：/əʊ/\n🔹 类型：魔法e\n🔹 示例单词：home, hope, rope, note",
        "u_e": "🔹 发音：/uː/\n🔹 类型：魔法e\n🔹 示例单词：cute, use, huge, tune"
    };
    
    // ========== 全局变量 ==========
    var MASTER_DATA = [];
    var currentIndex = 0;
    var isFlipped = false;
    var studyMode = "order";
    var studyLogs = [];
    var cardViews = {};
    var orderList = [];
    var sortable = null;
    var randomCache = null;
    var difficultyCache = null;
    
    // ========== CSV 读取 ==========
    function loadCSV() {
        fetch('phonics.csv')
            .then(function(response) {
                if (!response.ok) throw new Error('CSV文件未找到');
                return response.text();
            })
            .then(function(csvText) {
                parseCSV(csvText);
                initAfterData();
            })
            .catch(function(error) {
                console.error('加载CSV失败:', error);
                document.getElementById('fIpa').innerText = '⚠️';
                document.getElementById('fPhoneme').innerText = '请放置';
                document.getElementById('fCategory').innerText = 'phonics.csv';
            });
    }
    
    function parseCSV(text) {
        var lines = text.trim().split('\n');
        MASTER_DATA = [];
        for (var i = 1; i < lines.length; i++) {
            var line = lines[i];
            var parts = [];
            var inQuote = false;
            var current = '';
            for (var j = 0; j < line.length; j++) {
                var ch = line[j];
                if (ch === '"') inQuote = !inQuote;
                else if (ch === ',' && !inQuote) { parts.push(current); current = ''; }
                else current += ch;
            }
            parts.push(current);
            if (parts.length >= 7) {
                MASTER_DATA.push({
                    phoneme: parts[0].trim(),
                    ipa: parts[1].trim(),
                    category: parts[2].trim(),
                    word: parts[3].trim(),
                    marked: parts[4].trim(),
                    sentence: parts[5].trim(),
                    translation: parts[6].trim(),
                    audioFile: parts.length > 7 ? parts[7].trim() : ''
                });
            }
        }
    }
    
    function getWordIPA(word) {
        return WORD_IPA_MAP[word] || '/' + word + '/';
    }
    
    function getHighlightedFullIpa(word, phonemeIpa) {
        var fullIpa = getWordIPA(word);
        var cleanPhoneme = phonemeIpa.replace(/[\/\\]/g, '');
        var cleanFull = fullIpa;
        if (cleanFull.indexOf(cleanPhoneme) !== -1) {
            return cleanFull.replace(cleanPhoneme, '<span class="ipa-highlight">' + cleanPhoneme + '</span>');
        }
        return fullIpa;
    }
    
    function initAfterData() {
        orderList = [];
        for (var i = 0; i < MASTER_DATA.length; i++) {
            orderList.push(MASTER_DATA[i].phoneme);
            if (cardViews[MASTER_DATA[i].phoneme] === undefined) {
                cardViews[MASTER_DATA[i].phoneme] = false;
            }
        }
        loadStorage();
        renderCard();
        renderSidebar();
        renderRightPanel();
        bindEvents();
        setupTouchNav();
    }
    
    function getCurrentCards() {
        if (studyMode === "order") {
            var result = [];
            for (var i = 0; i < orderList.length; i++) {
                for (var j = 0; j < MASTER_DATA.length; j++) {
                    if (MASTER_DATA[j].phoneme === orderList[i]) { result.push(MASTER_DATA[j]); break; }
                }
            }
            return result;
        }
        else if (studyMode === "random") {
            if (!randomCache) {
                var shuffled = MASTER_DATA.slice();
                for (var i = shuffled.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var temp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = temp;
                }
                randomCache = shuffled;
            }
            return randomCache;
        }
        else {
            if (!difficultyCache) {
                function getScore(phoneme) {
                    var logs = [];
                    for (var i = 0; i < studyLogs.length; i++) if (studyLogs[i].cardId === phoneme) logs.push(studyLogs[i]);
                    logs = logs.slice(-3);
                    if (logs.length === 0) return 0.5;
                    var map = { again: 1, hard: 0.7, good: 0.3, easy: 0 };
                    var sum = 0;
                    for (var i = 0; i < logs.length; i++) sum += map[logs[i].rating] || 0.5;
                    return sum / logs.length;
                }
                var sorted = MASTER_DATA.slice();
                for (var i = 0; i < sorted.length - 1; i++) {
                    for (var j = i + 1; j < sorted.length; j++) {
                        if (getScore(sorted[j].phoneme) > getScore(sorted[i].phoneme)) {
                            var temp = sorted[i]; sorted[i] = sorted[j]; sorted[j] = temp;
                        }
                    }
                }
                difficultyCache = sorted;
            }
            return difficultyCache;
        }
    }
    
    function clearModeCache() { randomCache = null; difficultyCache = null; }
    
    function getExplanation(card) {
        if (SPECIAL_EXPLANATIONS[card.phoneme]) return SPECIAL_EXPLANATIONS[card.phoneme];
        return '🔹 发音：' + card.ipa + '\n🔹 类型：' + card.category + '\n🔹 示例单词：' + card.word;
    }
    
    function showExplanation(card) {
        document.getElementById('modalTitle').innerHTML = '📖 关于 "' + card.phoneme + '"';
        document.getElementById('modalBody').innerText = getExplanation(card);
        document.getElementById('modalOverlay').classList.add('active');
    }
    
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    
    function renderCard() {
        var cards = getCurrentCards();
        if (cards.length === 0) return;
        if (currentIndex >= cards.length) currentIndex = 0;
        var card = cards[currentIndex];
        if (!card) return;
        
        if (!cardViews[card.phoneme]) {
            cardViews[card.phoneme] = true;
            localStorage.setItem('cardViews', JSON.stringify(cardViews));
            updateAppearCount();
            renderRightPanel();
        }
        
        document.getElementById('fIpa').innerText = card.ipa;
        document.getElementById('fPhoneme').innerText = card.phoneme;
        document.getElementById('fCategory').innerText = card.category;
        
        var markedHtml = card.marked.replace(/\*\*/g, '<span class="highlight">');
        document.getElementById('bWord').innerHTML = markedHtml;
        var fullIpaHtml = getHighlightedFullIpa(card.word, card.ipa);
        document.getElementById('bIpaFull').innerHTML = fullIpaHtml;
        document.getElementById('bEn').innerText = card.sentence;
        document.getElementById('bCn').innerText = card.translation;
        document.getElementById('cardNumber').innerText = (currentIndex + 1) + " / " + cards.length;
        
        var infoIcons = document.querySelectorAll('.info-icon');
        for (var i = 0; i < infoIcons.length; i++) {
            infoIcons[i].onclick = function(e) { e.stopPropagation(); showExplanation(card); };
        }
        
        var flashcard = document.getElementById('flashcard');
        var ratingDiv = document.getElementById('ratingButtons');
        if (isFlipped) {
            flashcard.classList.add('flipped');
            ratingDiv.classList.add('visible');
        } else {
            flashcard.classList.remove('flipped');
            ratingDiv.classList.remove('visible');
        }
    }
    
    function flipCard() {
        isFlipped = !isFlipped;
        var flashcard = document.getElementById('flashcard');
        var ratingDiv = document.getElementById('ratingButtons');
        if (isFlipped) {
            flashcard.classList.add('flipped');
            ratingDiv.classList.add('visible');
        } else {
            flashcard.classList.remove('flipped');
            ratingDiv.classList.remove('visible');
        }
    }
    
    function nextCard() {
        var cards = getCurrentCards();
        if (currentIndex + 1 < cards.length) {
            currentIndex++;
            if (isFlipped) flipCard();
            renderCard();
            renderSidebar();
        }
    }
    
    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            if (isFlipped) flipCard();
            renderCard();
            renderSidebar();
        }
    }
    
    function playPhonemeAudio(card) {
        if (!card) return;
        if (card.audioFile && card.audioFile !== '') {
            var audio = new Audio('audio/' + card.audioFile);
            audio.play().catch(function() { fallbackTTS(card); });
        } else { fallbackTTS(card); }
    }
    
    function fallbackTTS(card) { speakText(card.phoneme + " sound"); }
    
    function speakText(text) {
        if (!text) return;
        try {
            window.speechSynthesis.cancel();
            var utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        } catch(e) {}
    }
    
    function rateCard(val) {
        var cards = getCurrentCards();
        var card = cards[currentIndex];
        var map = { 1: 'again', 2: 'hard', 3: 'good', 4: 'easy' };
        studyLogs.push({ cardId: card.phoneme, rating: map[val], timestamp: Date.now() });
        localStorage.setItem('studyLogs', JSON.stringify(studyLogs));
        showToast("已记录: " + map[val]);
        difficultyCache = null;
        renderRightPanel();
        updateAppearCount();
        if (studyMode === 'difficulty') {
            var currentPhoneme = card.phoneme;
            var newCards = getCurrentCards();
            var newIdx = 0;
            for (var i = 0; i < newCards.length; i++) if (newCards[i].phoneme === currentPhoneme) newIdx = i;
            currentIndex = newIdx;
            renderCard();
            renderSidebar();
        }
    }
    
    function showToast(msg) {
        var t = document.getElementById('toastMsg');
        if (!t) {
            t = document.createElement('div');
            t.id = 'toastMsg';
            t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2c3e2c;color:#fff;padding:8px 20px;border-radius:40px;z-index:200;opacity:0;transition:0.2s';
            document.body.appendChild(t);
        }
        t.innerText = msg;
        t.style.opacity = '1';
        setTimeout(function() { t.style.opacity = '0'; }, 1500);
    }
    
    function renderSidebar() {
        var container = document.getElementById('sidebarList');
        if (!container) return;
        var cards = getCurrentCards();
        container.innerHTML = '';
        for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            var div = document.createElement('div');
            div.className = 'sidebar-item';
            if (i === currentIndex) div.classList.add('active');
            div.setAttribute('data-id', card.phoneme);
            div.innerHTML = '<span>' + (i+1) + '. ' + card.phoneme + '</span>';
            div.onclick = (function(idx) {
                return function() {
                    currentIndex = idx;
                    if (isFlipped) flipCard();
                    renderCard();
                    renderSidebar();
                    closeSidebar();
                };
            })(i);
            container.appendChild(div);
        }
        initSortable();
    }
    
    function initSortable() {
        if (sortable) sortable.destroy();
        if (studyMode !== "order") return;
        var container = document.getElementById('sidebarList');
        if (!container) return;
        sortable = new Sortable(container, {
            animation: 300,
            handle: '.sidebar-item',
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            onEnd: function() {
                var newOrder = [];
                var items = container.querySelectorAll('.sidebar-item');
                for (var i = 0; i < items.length; i++) newOrder.push(items[i].getAttribute('data-id'));
                if (newOrder.length === MASTER_DATA.length) {
                    orderList = newOrder;
                    localStorage.setItem('orderList', JSON.stringify(orderList));
                    var currentPhoneme = getCurrentCards()[currentIndex]?.phoneme;
                    var newCards = getCurrentCards();
                    var newIdx = 0;
                    for (var i = 0; i < newCards.length; i++) if (newCards[i].phoneme === currentPhoneme) newIdx = i;
                    currentIndex = newIdx;
                    renderCard();
                    renderSidebar();
                    showToast("顺序已更新");
                }
            }
        });
    }
    
    function destroySortable() { if (sortable) { sortable.destroy(); sortable = null; } }
    
    function renderRightPanel() {
        var container = document.getElementById('rightPanelContent');
        if (!container) return;
        var ratedHtml = '', viewedHtml = '';
        var ratedCount = 0, viewedCount = 0;
        for (var i = 0; i < MASTER_DATA.length; i++) {
            var card = MASTER_DATA[i];
            if (!cardViews[card.phoneme]) continue;
            var hasRating = false, lastRating = null;
            for (var j = 0; j < studyLogs.length; j++) if (studyLogs[j].cardId === card.phoneme) { hasRating = true; lastRating = studyLogs[j]; }
            var ratingText = hasRating ? " (" + (lastRating ? lastRating.rating : '') + ")" : "";
            var itemHtml = '<div class="card-item" data-id="' + card.phoneme + '">' +
                '<span>' + (i+1) + '. ' + card.phoneme + ratingText + '</span>' +
                '<button class="clear-single-btn" data-id="' + card.phoneme + '">✕</button></div>';
            if (hasRating) { ratedHtml += itemHtml; ratedCount++; }
            else { viewedHtml += itemHtml; viewedCount++; }
        }
        container.innerHTML = 
            '<div class="section"><div class="section-title">📊 已评分 (' + ratedCount + ')</div>' + (ratedHtml || '<div class="empty-tip">暂无</div>') + '</div>' +
            '<div class="section"><div class="section-title">👁️ 仅翻看 (' + viewedCount + ')</div>' + (viewedHtml || '<div class="empty-tip">暂无</div>') + '</div>';
        
        document.querySelectorAll('.clear-single-btn').forEach(function(btn) {
            btn.onclick = function(e) {
                e.stopPropagation();
                var id = this.getAttribute('data-id');
                if (id && cardViews[id]) {
                    cardViews[id] = false;
                    localStorage.setItem('cardViews', JSON.stringify(cardViews));
                    renderRightPanel();
                    updateAppearCount();
                    showToast("已清除 " + id + " 浏览记录");
                }
            };
        });
        document.querySelectorAll('.card-item').forEach(function(item) {
            item.onclick = function(e) {
                if (e.target.classList.contains('clear-single-btn')) return;
                var id = item.getAttribute('data-id');
                if (id) jumpToCard(id);
            };
        });
    }
    
    function jumpToCard(phoneme) {
        var cards = getCurrentCards();
        for (var i = 0; i < cards.length; i++) if (cards[i].phoneme === phoneme) {
            currentIndex = i;
            if (isFlipped) flipCard();
            renderCard();
            renderSidebar();
            closeRightPanel();
            break;
        }
    }
    
    function clearAllViews() {
        if (confirm('清除所有浏览记录？评分数据会保留。')) {
            for (var k in cardViews) cardViews[k] = false;
            localStorage.setItem('cardViews', JSON.stringify(cardViews));
            renderRightPanel();
            updateAppearCount();
            showToast('已清除全部浏览记录');
        }
    }
    
    function updateAppearCount() {
        var total = 0;
        for (var k in cardViews) if (cardViews[k] === true) total++;
        document.getElementById('appearBtn').innerText = '出现 ' + total;
    }
    
    function setStudyMode(mode) {
        studyMode = mode;
        localStorage.setItem('studyMode', studyMode);
        currentIndex = 0;
        if (isFlipped) flipCard();
        clearModeCache();
        destroySortable();
        renderCard();
        renderSidebar();
    }
    
    function loadStorage() {
        var savedLogs = localStorage.getItem('studyLogs');
        if (savedLogs) studyLogs = JSON.parse(savedLogs);
        var savedViews = localStorage.getItem('cardViews');
        if (savedViews) cardViews = JSON.parse(savedViews);
        var savedOrder = localStorage.getItem('orderList');
        if (savedOrder && JSON.parse(savedOrder).length === MASTER_DATA.length) orderList = JSON.parse(savedOrder);
        var savedMode = localStorage.getItem('studyMode');
        if (savedMode) studyMode = savedMode;
        document.getElementById('modeSelect').value = studyMode;
        updateAppearCount();
    }
    
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); updateOverlay(); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); updateOverlay(); }
    function toggleRightPanel() { document.getElementById('rightPanel').classList.toggle('open'); updateOverlay(); }
    function closeRightPanel() { document.getElementById('rightPanel').classList.remove('open'); updateOverlay(); }
    function updateOverlay() {
        var open = document.getElementById('sidebar').classList.contains('open') || document.getElementById('rightPanel').classList.contains('open');
        document.getElementById('overlay').classList.toggle('show', open);
    }
    
    function setupTouchNav() {
        var wrapper = document.querySelector('.card-wrapper');
        var navButtons = document.getElementById('navButtons');
        if (!wrapper || !navButtons) return;
        var showNavTimer = null;
        function showNavTemporarily() {
            navButtons.classList.add('visible');
            if (showNavTimer) clearTimeout(showNavTimer);
            showNavTimer = setTimeout(function() { navButtons.classList.remove('visible'); }, 2000);
        }
        wrapper.addEventListener('touchstart', function(e) {
            if (!e.target.closest('.nav-btn')) showNavTemporarily();
        });
        wrapper.addEventListener('click', function(e) {
            if (!e.target.closest('.nav-btn') && !e.target.closest('.info-icon') && !e.target.closest('.btn-audio') && !e.target.closest('.btn-rate')) {
                showNavTemporarily();
            }
        });
    }
    
    function handleCardClick(e) {
        if (e.target.classList.contains('info-icon')) return;
        if (e.target.tagName === 'BUTTON') return;
        var rect = document.getElementById('cardContainer').getBoundingClientRect();
        var x = e.clientX - rect.left;
        var w = rect.width;
        if (x < w * 0.3) prevCard();
        else if (x > w * 0.7) nextCard();
        else flipCard();
    }
    
    function bindEvents() {
        document.getElementById('cardContainer').addEventListener('click', handleCardClick);
        document.getElementById('prevBtn').onclick = function() { prevCard(); };
        document.getElementById('nextBtn').onclick = function() { nextCard(); };
        document.getElementById('sidebarToggle').onclick = function() { toggleSidebar(); };
        document.getElementById('appearBtn').onclick = function() { toggleRightPanel(); };
        document.getElementById('closePanelBtn').onclick = function() { closeRightPanel(); };
        document.getElementById('clearAllBtn').onclick = function() { clearAllViews(); };
        document.getElementById('modeSelect').onchange = function(e) { setStudyMode(e.target.value); };
        document.getElementById('modalCloseBtn').onclick = function() { closeModal(); };
        document.getElementById('modalOverlay').onclick = function(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); };
        
        document.getElementById('btnFrontAudio').onclick = function(e) {
            e.stopPropagation();
            var cards = getCurrentCards();
            var card = cards[currentIndex];
            if (card) playPhonemeAudio(card);
        };
        document.getElementById('btnWordAudio').onclick = function(e) {
            e.stopPropagation();
            var cards = getCurrentCards();
            var card = cards[currentIndex];
            if (card) speakText(card.word);
        };
        document.getElementById('btnSentenceAudio').onclick = function(e) {
            e.stopPropagation();
            var cards = getCurrentCards();
            var card = cards[currentIndex];
            if (card) speakText(card.sentence);
        };
        
        document.querySelectorAll('.btn-rate').forEach(function(btn) {
            btn.onclick = function(e) {
                e.stopPropagation();
                if (isFlipped) rateCard(parseInt(this.dataset.rate));
            };
        });
        document.getElementById('overlay').onclick = function() { closeSidebar(); closeRightPanel(); };
        
        document.onkeydown = function(e) {
            if (e.key === 'ArrowLeft') { prevCard(); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { nextCard(); e.preventDefault(); }
            else if (e.key === ' ') { e.preventDefault(); flipCard(); }
            else if (e.key === '1' && isFlipped) { rateCard(1); e.preventDefault(); }
            else if (e.key === '2' && isFlipped) { rateCard(2); e.preventDefault(); }
            else if (e.key === '3' && isFlipped) { rateCard(3); e.preventDefault(); }
            else if (e.key === '4' && isFlipped) { rateCard(4); e.preventDefault(); }
            else if (e.key === 'r' || e.key === 'R') { toggleRightPanel(); e.preventDefault(); }
            else if (e.key === 'm' || e.key === 'M') {
                var modes = ['order', 'random', 'difficulty'];
                var next = modes[(modes.indexOf(studyMode) + 1) % 3];
                setStudyMode(next);
                document.getElementById('modeSelect').value = next;
                e.preventDefault();
            }
            else if (e.key === 'Escape') { closeModal(); }
        };
    }
    
    loadCSV();
})();
</script>
</body>
</html>
